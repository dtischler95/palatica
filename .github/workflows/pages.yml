name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'sw.js'
      - 'css/**'
      - 'fonts/**'
      - 'icons/**'
      - 'js/**'
      - '.github/workflows/pages.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/skip-non-app.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            CHANGED="$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")"
          else
            CHANGED="$(git diff --name-only "$BEFORE" "${{ github.sha }}")"
          fi
          echo "$CHANGED"

          # Exact files anchored with $, whole directories matched by prefix.
          if echo "$CHANGED" | grep -Eq '^(index\.html|manifest\.json|sw\.js|\.github/workflows/(pages|ci|skip-non-app)\.yml)$|^(css|fonts|icons|js)/'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: changes
    if: needs.changes.outputs.deploy == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
