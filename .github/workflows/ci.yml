name: CI

on:
  push:
    branches: [master, main]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'sw.js'
      - 'css/**'
      - 'fonts/**'
      - 'icons/**'
      - 'js/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/pages.yml'
      - '.github/workflows/skip-non-app.yml'
  pull_request:
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'sw.js'
      - 'css/**'
      - 'fonts/**'
      - 'icons/**'
      - 'js/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/pages.yml'
      - '.github/workflows/skip-non-app.yml'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            CHANGED="$(git diff --name-only "$BASE"...HEAD)"
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
              CHANGED="$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")"
            else
              CHANGED="$(git diff --name-only "$BEFORE" "${{ github.sha }}")"
            fi
          fi

          echo "$CHANGED"

          # Exact files anchored with $, whole directories matched by prefix.
          if echo "$CHANGED" | grep -Eq '^(index\.html|manifest\.json|sw\.js|\.github/workflows/(ci|pages|skip-non-app)\.yml)$|^(css|fonts|icons|js)/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  checks:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Parse-only check. The throwaway package.json makes node parse the files as ES modules.
      - name: JS syntax check
        run: |
          echo '{"type":"module"}' > package.json
          for f in $(find js -name '*.js') sw.js; do
            node --check "$f"
          done
          rm package.json

      - name: Service worker asset list check
        run: python3 scripts/check_assets.py

      - name: Python compile check
        run: python3 -m py_compile serve.py scripts/check_assets.py

      # Cached files changed without a VERSION bump would strand users on stale caches.
      - name: VERSION bump check
        if: github.event_name == 'pull_request'
        run: |
          BASE="origin/${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          CACHED=$(echo "$CHANGED" | grep -E '^(index\.html|manifest\.json|css/|js/|fonts/|icons/)' || true)
          if [ -n "$CACHED" ] && ! git diff "$BASE"...HEAD -- sw.js | grep -q '^+var VERSION'; then
            echo "Cached files changed but VERSION in sw.js was not bumped:"
            echo "$CACHED"
            exit 1
          fi
